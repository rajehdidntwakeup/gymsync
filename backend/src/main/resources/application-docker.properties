# Docker profile - uses H2 in-memory database
spring.application.name=GymSync

# H2 Database
spring.datasource.url=jdbc:h2:mem:gymsync;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver

# JPA - auto-create tables
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Flyway - disabled for docker
spring.flyway.enabled=false

# JWT
gymsync.jwt.secret=dockerSecretKeyForTestingOnly12345678901234567890
gymsync.jwt.expiration=86400000

# Logging
logging.level.com.gymsync=INFO