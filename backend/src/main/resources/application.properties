# Application
spring.application.name=GymSync
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/gymsync
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
gymsync.jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
gymsync.jwt.expiration=86400000

# Logging
logging.level.com.gymsync=DEBUG
logging.level.org.springframework.security=DEBUG