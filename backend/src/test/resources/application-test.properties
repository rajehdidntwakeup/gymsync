# Test configuration
spring.application.name=GymSync-Test

# H2 Database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway disabled for tests
spring.flyway.enabled=false

# Security - disabled for tests
spring.security.enabled=false

# Logging
logging.level.com.gymsync=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT
gymsync.jwt.secret=testSecretKeyForTestingOnly1234567890
gymsync.jwt.expiration=86400000