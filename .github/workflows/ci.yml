name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build with Maven (H2 Database)
        run: mvn clean test package -Dspring.profiles.active=test
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco

  mobile-expo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-expo
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-expo/package-lock.json
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Run tests
        run: npm test
        
      - name: Type check
        run: npx tsc --noEmit || true

  build-web:
    runs-on: ubuntu-latest
    needs: mobile-expo
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: mobile-expo
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-expo/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web
        run: npx expo export --platform web

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: mobile-expo/dist

  docker:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t gymsync-backend:latest .
        
      - name: Test Docker image
        run: docker run --rm gymsync-backend:latest java -version