name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Build with Maven (H2 Database)
        run: mvn clean test package -Dspring.profiles.active=test
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco

  mobile-expo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-expo
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-expo/package-lock.json
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  code-quality:
    runs-on: ubuntu-latest
    needs: [backend, mobile-expo]
    defaults:
      run:
        working-directory: mobile-expo
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-expo/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

  docker:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t gymsync-backend:latest .
        
      - name: Test Docker image
        run: |
          docker run -d --name gymsync-test -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:h2:mem:testdb \
            -e SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver \
            -e SPRING_DATASOURCE_USERNAME=sa \
            -e SPRING_DATASOURCE_PASSWORD= \
            -e SPRING_PROFILES_ACTIVE=test \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO=create \
            gymsync-backend:latest
          # Wait up to 30s for the app to start
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "App started and health check passed"
              docker stop gymsync-test
              exit 0
            fi
            sleep 1
          done
          echo "App failed health check within 30s"
          docker logs gymsync-test
          docker stop gymsync-test
          exit 1